apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bookflow-ingress
  namespace: bookflow
  annotations:
    # cert-manager (Let's Encrypt) — 클러스터에 cert-manager 설치되어 있어야 함
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # nginx-ingress용 옵션 (Traefik이면 다른 어노테이션 필요)
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - booksys.co.kr
        - www.booksys.co.kr
      secretName: bookflow-tls
  rules:
    - host: booksys.co.kr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bookflow-app
                port:
                  number: 80
    - host: www.booksys.co.kr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bookflow-app
                port:
                  number: 80
