apiVersion: v1
kind: ConfigMap
metadata:
  name: bookflow-config
  namespace: bookflow
data:
  APP_NAME: "BookFlow"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "https://booksys.co.kr"
  APP_TIMEZONE: "Asia/Seoul"
  APP_LOCALE: "ko"
  APP_FALLBACK_LOCALE: "en"
  APP_FAKER_LOCALE: "ko_KR"

  LOG_CHANNEL: "stderr"
  LOG_STACK: "stderr"
  LOG_LEVEL: "warning"

  DB_CONNECTION: "mysql"
  DB_HOST: "bookflow-db"        # 외부 RDS면 endpoint로 교체
  DB_PORT: "3306"
  DB_DATABASE: "bookflow"

  REDIS_CLIENT: "phpredis"
  REDIS_HOST: "bookflow-redis"
  REDIS_PORT: "6379"

  CACHE_STORE: "redis"
  SESSION_DRIVER: "redis"
  SESSION_LIFETIME: "43200"
  SESSION_EXPIRE_ON_CLOSE: "false"
  QUEUE_CONNECTION: "redis"

  FILESYSTEM_DISK: "public"
  BROADCAST_CONNECTION: "log"

  MAIL_MAILER: "log"            # 운영은 SES/SMTP로 교체
  MAIL_FROM_ADDRESS: "no-reply@booksys.co.kr"
  MAIL_FROM_NAME: "BookFlow"

  # entrypoint.sh가 사용하는 플래그
  RUN_CACHE_OPTIMIZE: "1"
  RUN_MIGRATIONS: "0"           # 첫 배포 후 Job으로 분리 권장
  RUN_SEEDS: "0"
