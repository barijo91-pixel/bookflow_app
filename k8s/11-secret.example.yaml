# 실제 운영용 Secret 예시.
# 운영에서는 이 파일을 절대 git에 커밋하지 말 것.
# 실제 키 입력 후 다른 이름(11-secret.yaml)으로 저장하거나,
# sealed-secrets / external-secrets / Vault 사용을 권장.
apiVersion: v1
kind: Secret
metadata:
  name: bookflow-secret
  namespace: bookflow
type: Opaque
stringData:
  # 필수
  APP_KEY: "base64:REPLACE_WITH_php_artisan_key:generate__output"

  # DB
  DB_USERNAME: "bookflow"
  DB_PASSWORD: "CHANGE_ME"

  # Redis (비번 사용 시)
  REDIS_PASSWORD: "null"

  # 외부 연동
  ALADIN_TTB_KEY: "ttbbarijo0654001"
  ALIGO_API_KEY: ""
  ALIGO_USER_ID: ""
  ALIGO_SENDER_KEY: ""
  ALIGO_SENDER: ""
  ALIGO_ADMIN_PHONE: ""
  KAKAO_CLIENT_ID: ""
  KAKAO_CLIENT_SECRET: ""
  FCM_SERVER_KEY: ""
  FCM_PROJECT_ID: ""
