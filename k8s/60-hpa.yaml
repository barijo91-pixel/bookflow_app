# 트래픽 따라 자동 스케일링 (2~6 Pod)
# metrics-server가 클러스터에 설치되어 있어야 함
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bookflow-app
  namespace: bookflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bookflow-app
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
